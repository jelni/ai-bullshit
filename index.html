<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game Engine</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            line-height: 1.6;
            color: #ccc;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #111;
        }
        h1, h2, h3 {
            color: #fff;
        }
        #game-container {
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            font-size: 14px;
            line-height: 14px;
            text-align: left;
            margin: 20px auto;
            border: 1px solid #333;
            background-color: #000;
            padding: 10px;
            display: inline-block;
        }
        .container-wrapper {
            text-align: center;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Snake Game Engine</h1>
        <p>The ultimate e-sports platform, now in your browser.</p>
    </div>

    <div class="container-wrapper">
        <div id="game-container">Loading WASM engine...</div>
    </div>

    <p style="text-align: center; color: #888; font-size: 0.9em;">
        Controls: W,A,S,D or Arrow Keys to move. Space to start/pause. T to toggle Bot Mode.
    </p>

    <script type="module">
        import init from './pkg/snake_game.js';

        async function run() {
            try {
                await init();
                console.log("WASM loaded and game started");
            } catch (e) {
                console.error("Failed to load WASM:", e);
                document.getElementById('game-container').innerText = "Error loading game: " + e;
            }
        }
        run();
    </script>
</body>
</html>
