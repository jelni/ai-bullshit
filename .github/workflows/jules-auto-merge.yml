on: "pull_request"

permissions:
  contents: "write"
  pull-requests: "write"

jobs:
  auto-merge:
    runs-on: "ubuntu-latest"
    if: github.event.pull_request.user.login == 'google-labs-jules[bot]'
    steps:
      - run: |
          for i in {1..12}; do
            if gh pr merge --auto --delete-branch --squash "$PR_URL"; then
              exit 0
            fi
            if gh pr merge --delete-branch --squash "$PR_URL"; then
              exit 0
            fi
            sleep 10
          done
          exit 1
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
