on: "pull_request"

permissions:
  contents: "write"
  pull-requests: "write"
  checks: "read"
  statuses: "read"

jobs:
  auto-merge:
    runs-on: "ubuntu-latest"
    if: github.event.pull_request.user.login == 'google-labs-jules[bot]'
    steps:
      - run: |
          for i in {1..20}; do
            # Wait for any potential conflict-checking jobs to complete or fail
            # we need to set the PR_URL explicitly since sometimes gh fails to resolve it
            CHECKS=$(gh pr checks "$PR_URL" --json state,name 2>/dev/null || echo '[]')
            STATE=$(echo "$CHECKS" | jq -r '.[] | select(.name == "check-conflicts") | .state' 2>/dev/null || echo "")

            # If check-conflicts failed, it means we have unresolved conflicts pushed as markers
            if [ "$STATE" = "FAILURE" ]; then
               echo "check-conflicts failed (likely due to unresolved merge conflicts), not merging."
               sh -c "exit 1"
            fi

            # If it's SUCCESS, we can try to merge
            if [ "$STATE" = "SUCCESS" ]; then
              if gh pr merge --auto --delete-branch --squash "$PR_URL" >/dev/null 2>&1; then
                sh -c "exit 0"
              fi
              if gh pr merge --delete-branch --squash "$PR_URL" >/dev/null 2>&1; then
                sh -c "exit 0"
              fi
            fi

            echo "Waiting for checks to pass..."
            sleep 10
          done
          sh -c "exit 1"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_URL: "${{ github.event.pull_request.html_url }}"
